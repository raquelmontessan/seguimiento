<svg xmlns="http://www.w3.org/2000/svg" width="1024" height="1024" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#9c2a40"/>
      <stop offset="0.55" stop-color="#8e2438"/>
      <stop offset="1" stop-color="#6f172a"/>
    </linearGradient>
  </defs>
  <!-- fondo (Android lo enmascara como adaptativo) -->
  <rect width="1024" height="1024" rx="220" fill="url(#g)"/>
  <!-- anillo institucional -->
  <circle cx="512" cy="430" r="288" fill="none" stroke="#b3843a" stroke-width="10" opacity="0.35"/>
  <!-- monograma QA -->
  <text x="512" y="470" text-anchor="middle" dominant-baseline="middle"
        font-family="Segoe UI, system-ui, Arial, sans-serif" font-weight="800"
        font-size="340" fill="#ffffff" letter-spacing="4">QA</text>
  <!-- barras de avance (seguimiento) -->
  <g>
    <rect x="356" y="712" width="76" height="96"  rx="14" fill="#f0c9d1"/>
    <rect x="468" y="664" width="76" height="144" rx="14" fill="#e6b98f"/>
    <rect x="580" y="612" width="76" height="196" rx="14" fill="#b3843a"/>
  </g>
  <!-- línea de tendencia -->
  <path d="M366 700 L506 652 L618 600" fill="none" stroke="#ffffff" stroke-width="12"
        stroke-linecap="round" stroke-linejoin="round" opacity="0.9"/>
  <circle cx="618" cy="600" r="16" fill="#ffffff"/>
</svg>
