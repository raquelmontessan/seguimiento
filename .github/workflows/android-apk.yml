name: Build Android APK

on:
  push:
    branches: [main]
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  build-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Java (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web (Angular)
        run: npx ng build --configuration production

      - name: Add Android platform
        run: npx cap add android

      - name: Generate app icon and splash screen
        run: >
          npx @capacitor/assets generate
          --android
          --assetPath brand
          --iconBackgroundColor '#ffffff'
          --iconBackgroundColorDark '#8e2438'
          --splashBackgroundColor '#faf1f2'
          --splashBackgroundColorDark '#8e2438'

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon --stacktrace

      - name: Rename APK
        run: |
          mkdir -p dist-apk
          cp android/app/build/outputs/apk/debug/app-debug.apk "dist-apk/tablero-qa-${GITHUB_SHA::7}.apk"

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: tablero-qa-apk
          path: dist-apk/*.apk
          retention-days: 30
          if-no-files-found: error
